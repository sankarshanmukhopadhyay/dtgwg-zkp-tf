name: Conformance harness

on:
  pull_request:
    paths:
      - "conformance-harness/**"
      - "docs/implementation-guide/conformance/**"
      - "docs/implementation-guide/security/**"
      - "scripts/validate_conformance_harness.py"
      - ".github/workflows/conformance-harness.yml"
  push:
    branches: [main]
    paths:
      - "conformance-harness/**"
      - "docs/implementation-guide/conformance/**"
      - "docs/implementation-guide/security/**"
      - "scripts/validate_conformance_harness.py"
      - ".github/workflows/conformance-harness.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install harness
        run: python -m pip install --disable-pip-version-check pytest -e conformance-harness
      - name: Validate execution dispositions
        run: python scripts/validate_conformance_harness.py
      - name: Run unit tests
        run: pytest -q conformance-harness/tests
      - name: Execute deterministic subset
        run: |
          dtgwg-zkp-conformance \
            --manifest conformance-harness/examples/mock-manifest.json \
            --schema docs/implementation-guide/conformance/schemas/conformance-test-manifest.schema.json \
            --output results
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: conformance-evidence
          path: results/
