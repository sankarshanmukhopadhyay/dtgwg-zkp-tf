title: DTG ZKP Implementation and Interoperability Guide
description: Non-normative implementation, deployment, assurance and conformance guidance for DTG zero-knowledge proof profiles.
remote_theme: just-the-docs/just-the-docs@v0.10.1
url: "https://trustoverip.github.io"
baseurl: "/dtgwg-zkp-tf"
repository: trustoverip/dtgwg-zkp-tf
permalink: pretty
search_enabled: true
heading_anchors: true
color_scheme: dtg
aux_links:
  "View on GitHub":
    - "https://github.com/trustoverip/dtgwg-zkp-tf"
aux_links_new_tab: true
callouts:
  warning:
    title: Security or privacy warning
    color: red
  governance:
    title: Governance dependency
    color: yellow
  evidence:
    title: Assurance evidence
    color: blue
  decision:
    title: Deployment decision
    color: green
plugins:
  - jekyll-remote-theme
exclude:
  - scripts
  - vendor
  - "*.zip"
  - Gemfile.lock
